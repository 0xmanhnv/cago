{% extends "templates/web.html" %}

{% block title %}Chủ cửa hàng - Minh Tuyết{% endblock %}

{% block page_content %}
<style>
	.navbar, .web-footer, footer, .page-head { display: none !important; }
	body { background: #f4f6f8; }
	.ag-wrap { max-width: 760px; margin: 0 auto; padding: 16px; font-size: 18px; color: #1b2733; }
	.ag-title { font-size: 26px; font-weight: 700; text-align: center; margin: 12px 0 20px; }
	.ag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
	.ag-btn { display: flex; align-items: center; justify-content: center; text-align: center; min-height: 88px; border-radius: 14px; border: none; cursor: pointer; font-size: 19px; font-weight: 700; color: #fff; background: #2563eb; padding: 10px; }
	.ag-btn.green { background: #16a34a; } .ag-btn.amber { background: #d97706; } .ag-btn.red { background: #dc2626; } .ag-btn.teal { background: #0d9488; } .ag-btn.gray { background: #64748b; } .ag-btn.purple { background: #7c3aed; }
	.ag-btn:active { transform: scale(0.98); }
	.ag-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
	.ag-back { background: #e2e8f0; color: #1b2733; border: none; border-radius: 10px; padding: 12px 16px; font-size: 18px; font-weight: 700; cursor: pointer; }
	.ag-input { flex: 1; width: 100%; box-sizing: border-box; padding: 14px; font-size: 18px; border: 2px solid #cbd5e1; border-radius: 10px; margin-bottom: 12px; }
	.ag-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; gap: 12px; cursor: pointer; align-items: center; }
	.ag-card img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #eef2f6; }
	.ag-card .name { font-weight: 700; } .ag-card .price { color: #16a34a; font-weight: 700; }
	.ag-muted { color: #64748b; font-size: 16px; }
	.ag-detail { background: #fff; border-radius: 12px; padding: 16px; }
	.ag-detail img { width: 100%; max-height: 240px; object-fit: contain; background: #eef2f6; border-radius: 10px; }
	.ag-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eef2f6; gap: 12px; }
	.ag-bignum { font-size: 30px; font-weight: 800; color: #16a34a; }
	.ag-bigdebt { font-size: 30px; font-weight: 800; color: #dc2626; }
	.ag-warn { background: #fef3c7; border: 1px solid #f59e0b; color: #7c2d12; border-radius: 10px; padding: 12px; margin-top: 12px; }
	.ag-ok { background: #dcfce7; border: 1px solid #16a34a; color: #14532d; border-radius: 10px; padding: 14px; font-weight: 700; }
	.ag-priceinput { font-size: 28px; padding: 14px; width: 100%; border: 2px solid #16a34a; border-radius: 10px; text-align: right; }
	.ag-confirm { width: 100%; min-height: 60px; font-size: 22px; }
	.ag-spin { text-align: center; padding: 30px; color: #64748b; }
	.ag-sec { font-weight: 700; margin-top: 12px; }
	.ag-elabel { display: block; font-weight: 700; margin: 12px 0 4px; color: #334155; font-size: 16px; }
	.ag-einput { width: 100%; padding: 12px; font-size: 17px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
	.ag-echk { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; margin-top: 12px; }
	.ag-echk input { width: 24px; height: 24px; }
</style>

<div class="ag-wrap" id="app"></div>

<script>
(function () {
	const app = document.getElementById('app');
	const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
	const spin = () => { app.innerHTML = '<div class="ag-spin">Đang tải...</div>'; };
	const call = (method, args) => new Promise((res, rej) => frappe.call({
		method, args,
		callback: r => res(r.message),
		error: (e) => {
			if (app.querySelector('.ag-spin')) {
				app.innerHTML = '<div class="ag-bar"><button class="ag-back" id="ag-reload">← Tải lại</button></div><div class="ag-warn">Lỗi tải dữ liệu. Kiểm tra mạng rồi bấm "Tải lại".</div>';
				const b = app.querySelector('#ag-reload'); if (b) b.onclick = () => location.reload();
			}
			rej(e);
		}
	}));
	const backBar = (fn, label) => { const b = document.createElement('div'); return `<div class="ag-bar"><button class="ag-back" id="bk">← ${esc(label||'Trang chủ')}</button></div>`; };
	const wireBack = (fn) => { const b = app.querySelector('#bk'); if (b) b.onclick = fn; };

	function home() {
		app.innerHTML = `
			<div class="ag-title">CHỦ CỬA HÀNG</div>
			<div class="ag-grid">
				<button class="ag-btn" data-go="priceLookup">🔎 Tra giá</button>
				<button class="ag-btn amber" data-go="editProduct">✏️ Sửa sản phẩm</button>
				<button class="ag-btn teal" data-go="newProduct">➕ Thêm sản phẩm</button>
				<button class="ag-btn red" data-go="addDebt">📝 Ghi nợ</button>
				<button class="ag-btn green" data-go="repayDebt">💵 Khách trả nợ</button>
				<button class="ag-btn purple" data-go="debtListView">📒 Công nợ</button>
				<button class="ag-btn teal" data-go="lowStockView">📦 Hàng sắp hết</button>
				<button class="ag-btn" data-go="todayReport">📊 Báo cáo hôm nay</button>
				<button class="ag-btn green" onclick="window.location='/app/point-of-sale'">🛒 Bán hàng (POS)</button>
			</div>
			<div style="height:14px"></div>
			<div class="ag-grid">
				<button class="ag-btn gray" onclick="window.location='/app'">⚙️ Quản lý ERPNext</button>
				<button class="ag-btn red" onclick="frappe.call({method:'logout',callback:function(){location.href='/login'}})">🚪 Đăng xuất</button>
			</div>`;
		app.querySelectorAll('[data-go]').forEach(b => b.onclick = () => views[b.dataset.go]());
	}

	// ---- generic product search (shows the full list by default) ----
	function productSearch(title, onPick) {
		app.innerHTML = `${backBar()}<input class="ag-input" placeholder="Tên, tên hay gọi, màu bao..." autofocus>
			<div class="ag-title" style="font-size:20px">${esc(title)}</div><div id="results"><div class="ag-spin">Đang tải...</div></div>`;
		wireBack(home);
		const input = app.querySelector('.ag-input'), results = app.querySelector('#results');
		const run = async (q) => {
			results.innerHTML = '<div class="ag-spin">Đang tải...</div>';
			const list = await call('cago.api.owner.search_products', { query: q });
			results.innerHTML = list.length ? list.map(p => `
				<div class="ag-card" data-code="${esc(p.item_code)}"><img src="${esc(p.image||'')}" onerror="this.style.visibility='hidden'">
				<div><div class="name">${esc(p.display_name)}</div><div class="price">${esc(p.price_text)}</div>
				<div class="ag-muted">${esc(p.stock_status||'')}</div></div></div>`).join('') : '<div class="ag-muted">Không tìm thấy.</div>';
			results.querySelectorAll('.ag-card').forEach(c => c.onclick = () => onPick(c.dataset.code));
		};
		let t;
		input.oninput = () => { clearTimeout(t); t = setTimeout(() => run(input.value.trim()), 250); };
		run('');  // default: show all products immediately
	}

	// ---- generic customer search (with "add new customer" when not found) ----
	function customerSearch(title, onPick) {
		const showSearch = () => {
			app.innerHTML = `${backBar()}<input class="ag-input" placeholder="Tên khách, xóm..." autofocus>
				<div class="ag-title" style="font-size:20px">${esc(title)}</div>
				<div id="results"><div class="ag-muted">Gõ tên khách để tìm.</div></div>
				<button class="ag-btn teal" id="addnew" style="width:100%;margin-top:10px">➕ Thêm khách mới</button>`;
			wireBack(home);
			const input = app.querySelector('.ag-input'), results = app.querySelector('#results');
			const run = async () => {
				const q = input.value.trim();
				results.innerHTML = '<div class="ag-spin">Đang tìm...</div>';
				const list = await call('cago.api.debt.search_customers', { query: q });
				results.innerHTML = list.length ? list.map(c => `
					<div class="ag-card" data-cust="${esc(c.customer)}"><div style="flex:1">
					<div class="name">${esc(c.customer_name)}</div>
					<div class="ag-muted">${esc(c.village||'')} ${c.mobile?'· '+esc(c.mobile):''}</div></div>
					<div class="${c.debt>0?'ag-bigdebt':'ag-muted'}" style="font-size:18px">${c.debt>0?(c.debt.toLocaleString('vi-VN')+'đ'):'Không nợ'}</div></div>`).join('') : '<div class="ag-muted">Không tìm thấy khách. Bấm "Thêm khách mới" bên dưới.</div>';
				results.querySelectorAll('.ag-card').forEach(el => el.onclick = () => onPick(el.dataset.cust));
			};
			let tt; input.oninput = () => { clearTimeout(tt); tt = setTimeout(run, 250); };
			app.querySelector('#addnew').onclick = () => showAddForm(input.value.trim());
			run();
		};

		const showAddForm = (prefillName) => {
			app.innerHTML = `${backBar()}<div class="ag-title" style="font-size:20px">THÊM KHÁCH MỚI</div>
				<div class="ag-detail">
					<label class="ag-elabel">Tên khách *</label><input class="ag-einput" id="c-name" value="${esc(prefillName||'')}">
					<label class="ag-elabel">Số điện thoại (tùy chọn)</label><input class="ag-einput" id="c-phone" inputmode="tel" placeholder="VD: 0987654321">
					<label class="ag-elabel">Xóm/thôn (tùy chọn)</label><input class="ag-einput" id="c-village">
					<div style="height:14px"></div>
					<button class="ag-btn green ag-confirm" id="c-save">Lưu khách</button>
					<div id="c-msg"></div>
				</div>`;
			wireBack(showSearch);
			app.querySelector('#c-save').onclick = async () => {
				const name = app.querySelector('#c-name').value.trim();
				const msg = app.querySelector('#c-msg');
				if (!name) { msg.innerHTML = '<div class="ag-warn">Nhập tên khách.</div>'; return; }
				app.querySelector('#c-save').disabled = true;
				try {
					const r = await call('cago.api.debt.add_customer', {
						customer_name: name,
						phone: app.querySelector('#c-phone').value.trim(),
						village: app.querySelector('#c-village').value.trim(),
					});
					onPick(r.customer);  // continue straight into the debt action for the new customer
				} catch (e) { msg.innerHTML = '<div class="ag-warn">Lỗi: không tạo được khách.</div>'; app.querySelector('#c-save').disabled = false; }
			};
		};

		showSearch();
	}

	function debtAction(mode) { // mode: 'add' | 'repay'
		const method = mode === 'add' ? 'cago.api.debt.record_debt' : 'cago.api.debt.record_repayment';
		const title = mode === 'add' ? 'GHI NỢ' : 'KHÁCH TRẢ NỢ';
		customerSearch(title, async (cust) => {
			spin();
			const d = await call('cago.api.debt.get_customer_debt', { customer: cust });
			app.innerHTML = `${backBar(null,'Quay lại')}
				<div class="ag-detail"><h2>${esc(d.customer_name)}</h2>
				<div class="ag-row"><span class="ag-muted">Đang nợ</span><span class="ag-bigdebt">${esc(d.outstanding_text)}</span></div>
				<p class="ag-muted">${mode==='add'?'Số tiền ghi nợ thêm':'Số tiền khách trả'} (đồng):</p>
				<input class="ag-priceinput" id="amt" inputmode="numeric" placeholder="0">
				<div style="height:12px"></div>
				<button class="ag-btn ${mode==='add'?'red':'green'} ag-confirm" id="save">${mode==='add'?'Ghi nợ':'Xác nhận trả'}</button>
				<div id="msg"></div></div>`;
			wireBack(() => debtAction(mode));
			app.querySelector('#save').onclick = async () => {
				const val = parseFloat(app.querySelector('#amt').value); const msg = app.querySelector('#msg');
				if (!val || val <= 0) { msg.innerHTML = '<div class="ag-warn">Số tiền phải lớn hơn 0.</div>'; return; }
				if (!confirm((mode==='add'?'Ghi nợ ':'Khách trả ') + val.toLocaleString('vi-VN') + 'đ cho ' + d.customer_name + '?')) return;
				app.querySelector('#save').disabled = true;
				try { const r = await call(method, { customer: cust, amount: val });
					msg.innerHTML = '<div style="height:12px"></div><div class="ag-ok">✅ Xong. Nợ còn lại: ' + esc(r.outstanding_text) + '</div>';
				} catch (e) { msg.innerHTML = '<div class="ag-warn">Lỗi: không lưu được.</div>'; app.querySelector('#save').disabled = false; }
			};
		});
	}

	const views = {
		priceLookup() { productSearch('TRA GIÁ', async (code) => {
			spin(); const p = await call('cago.api.owner.get_product', { item_code: code });
			app.innerHTML = `${backBar(null,'Quay lại')}<div class="ag-detail">
				<img src="${esc(p.image||'')}" onerror="this.style.visibility='hidden'"><h2>${esc(p.display_name)}</h2>
				<div class="ag-bignum">${esc(p.price_text)}</div>
				<div class="ag-row"><span class="ag-muted">Tồn kho</span><b>${esc(p.stock_status||'-')} (${p.actual_stock_qty})</b></div>
				<div class="ag-row"><span class="ag-muted">Vị trí</span><b>${esc(p.shelf_location||'-')}</b></div>
				${p.safety_notes ? `<div class="ag-warn">⚠️ ${esc(p.safety_notes)}</div>`:''}
				<div style="height:12px"></div><button class="ag-btn amber ag-confirm" id="edit">✏️ Sửa sản phẩm này</button></div>`;
			wireBack(views.priceLookup);
			app.querySelector('#edit').onclick = () => productEditor(code); }); },
		editProduct() { productSearch('SỬA SẢN PHẨM', (code) => productEditor(code)); },
		newProduct() { createProductForm(); },
		addDebt() { debtAction('add'); },
		repayDebt() { debtAction('repay'); },
		async debtListView() { spin(); const list = await call('cago.api.reports.debt_list', {});
			app.innerHTML = `${backBar()}<div class="ag-title" style="font-size:20px">CÔNG NỢ KHÁCH HÀNG</div>
				${list.length ? list.map(c => `<div class="ag-card" data-cust="${esc(c.customer)}"><div style="flex:1"><div class="name">${esc(c.customer_name)}</div><div class="ag-muted">${esc(c.village||'')} · bấm xem chi tiết</div></div><div class="ag-bigdebt" style="font-size:20px">${esc(c.outstanding_text)}</div></div>`).join('') : '<div class="ag-ok">Không có khách nào đang nợ. 🎉</div>'}`;
			wireBack(home);
			app.querySelectorAll('[data-cust]').forEach(el => el.onclick = () => customerLedger(el.dataset.cust)); },
		async lowStockView() { spin(); const list = await call('cago.api.reports.low_stock', {});
			app.innerHTML = `${backBar()}<div class="ag-title" style="font-size:20px">HÀNG SẮP HẾT</div>
				${list.length ? list.map(p => `<div class="ag-card"><div style="flex:1"><div class="name">${esc(p.display_name)}</div><div class="ag-muted">${esc(p.shelf_location||'')}</div></div><div class="ag-bigdebt" style="font-size:18px">${esc(p.status)}</div></div>`).join('') : '<div class="ag-ok">Không có hàng nào sắp hết. 👍</div>'}`;
			wireBack(home); },
		async todayReport(period) { period = period || 'today'; spin();
			const s = await call('cago.api.reports.period_summary', { period });
			const best = await call('cago.api.reports.best_sellers', { limit: 5 });
			const tab = (p, label) => `<button class="ag-back" data-period="${p}" style="${p === period ? 'background:#2563eb;color:#fff' : ''}">${label}</button>`;
			app.innerHTML = `${backBar()}<div class="ag-title" style="font-size:20px">BÁO CÁO</div>
				<div class="ag-bar">${tab('today', 'Hôm nay')}${tab('week', 'Tuần')}${tab('month', 'Tháng')}</div>
				<div class="ag-detail"><div class="ag-row"><span class="ag-muted">Kỳ</span><b>${esc(s.period_label)}</b></div>
				<div class="ag-row"><span class="ag-muted">Doanh thu</span><span class="ag-bignum">${esc(s.sales_total_text)}</span></div>
				<div class="ag-row"><span class="ag-muted">Số hóa đơn</span><b>${s.invoice_count}</b></div>
				${best.length ? '<div style="margin-top:10px;font-weight:700">Bán chạy</div>' + best.map(b=>`<div class="ag-row"><span>${esc(b.display_name)}</span><b>${b.qty}</b></div>`).join('') : '<div class="ag-muted" style="margin-top:10px">Chưa có dữ liệu bán hàng.</div>'}</div>`;
			wireBack(home);
			app.querySelectorAll('[data-period]').forEach(b => b.onclick = () => views.todayReport(b.dataset.period)); },
	};

	// Unified product editor: ảnh + giá + mọi thông tin trong 1 màn.
	async function productEditor(code) {
		spin();
		const e = await call('cago.api.owner.get_product_for_edit', { item_code: code });
		const fld = (label, name, val, type) => `<label class="ag-elabel">${esc(label)}</label><input class="ag-einput" data-f="${name}" type="${type || 'text'}" ${type === 'number' ? 'inputmode="numeric"' : ''} value="${esc(val == null ? '' : val)}">`;
		const area = (label, name, val) => `<label class="ag-elabel">${esc(label)}</label><textarea class="ag-einput" data-f="${name}" rows="2">${esc(val || '')}</textarea>`;
		const sel = (label, name, val, opts) => `<label class="ag-elabel">${esc(label)}</label><select class="ag-einput" data-f="${name}">${['', ...opts].map(o => `<option ${o === (val || '') ? 'selected' : ''}>${esc(o)}</option>`).join('')}</select>`;
		const chk = (label, name, val) => `<label class="ag-echk"><input type="checkbox" data-f="${name}" ${val ? 'checked' : ''}> ${esc(label)}</label>`;
		app.innerHTML = `${backBar(null, 'Quay lại')}
			<div class="ag-detail">
				<h2>Sửa: ${esc(e.cago_display_name || e.item_name)}</h2>
				<div id="imgsec"></div>
				<div class="ag-sec" style="margin-top:16px;font-weight:800;font-size:18px">Thông tin sản phẩm</div>
				${fld('Tên hiển thị', 'cago_display_name', e.cago_display_name)}
				${fld('Giá bán (đồng)', 'selling_price', e.selling_price, 'number')}
				${sel('Tồn kho hiển thị', 'cago_stock_status_manual', e.cago_stock_status_manual, e.stock_status_options)}
				${fld('Vị trí để hàng', 'cago_shelf_location', e.cago_shelf_location)}
				${fld('Tên dân dã (khách hay gọi)', 'cago_local_names', e.cago_local_names)}
				${area('Mô tả ngắn cho khách', 'cago_public_description', e.cago_public_description)}
				${fld('Dùng cho', 'cago_use_cases', e.cago_use_cases)}
				${fld('Cây/con phù hợp', 'cago_crop_or_animal_targets', e.cago_crop_or_animal_targets)}
				${fld('Màu bao bì', 'cago_package_color', e.cago_package_color)}
				${sel('Mức chất lượng', 'cago_product_quality_tier', e.cago_product_quality_tier, e.quality_options)}
				${area('Câu tư vấn cho người bán', 'cago_staff_advice', e.cago_staff_advice)}
				${area('Khi nào cần gọi chủ', 'cago_call_owner_when', e.cago_call_owner_when)}
				${area('Lưu ý an toàn', 'cago_safety_notes', e.cago_safety_notes)}
				${chk('Là hóa chất/thuốc', 'cago_is_chemical', e.cago_is_chemical)}
				${chk('Hiển thị trên kiosk', 'cago_is_public_visible', e.cago_is_public_visible)}
				<div style="height:14px"></div>
				<button class="ag-btn amber ag-confirm" id="save">💾 Lưu sản phẩm</button>
				<button class="ag-btn teal ag-confirm" id="restock" style="margin-top:10px">📩 Soạn tin báo hàng về</button>
				<div id="msg"></div>
			</div>`;
		wireBack(views.editProduct);
		app.querySelector('#restock').onclick = async () => {
			const r = await call('cago.api.owner.zalo_draft', { kind: 'restock', item_code: code });
			showDraft(r.text);
		};

		const renderImg = (d) => {
			const main = d.main ? `<img src="${esc(d.main)}" style="width:100%;max-height:220px;object-fit:contain;background:#eef2f6;border-radius:10px">` : '<div class="ag-muted" style="padding:20px;text-align:center;background:#eef2f6;border-radius:10px">Chưa có ảnh — bấm "Tải ảnh lên"</div>';
			const gal = d.images.map(u => `<div style="border:1px solid #e2e8f0;border-radius:10px;padding:6px;margin-top:6px;display:flex;gap:8px;align-items:center"><img src="${esc(u)}" style="width:56px;height:56px;object-fit:cover;border-radius:8px"><div style="flex:1">${u === d.main ? '<b style="color:#16a34a">★ Ảnh chính</b>' : `<button class="ag-back" data-main="${esc(u)}">Đặt ảnh chính</button>`}</div><button class="ag-back" style="background:#fee2e2;color:#b91c1c" data-del="${esc(u)}">Xoá</button></div>`).join('');
			document.getElementById('imgsec').innerHTML = `<div class="ag-sec" style="font-weight:800;font-size:18px">Ảnh sản phẩm</div>${main}<label class="ag-btn teal ag-confirm" style="display:flex;margin-top:8px"><input type="file" accept="image/*" multiple id="imgfile" style="display:none">📷 Tải ảnh lên</label><div id="upmsg"></div>${gal}`;
			document.querySelectorAll('#imgsec [data-main]').forEach(b => b.onclick = async () => renderImg(await call('cago.api.owner.set_main_image', { item_code: code, image_url: b.dataset.main })));
			document.querySelectorAll('#imgsec [data-del]').forEach(b => b.onclick = async () => { if (confirm('Xoá ảnh này?')) renderImg(await call('cago.api.owner.remove_product_image', { item_code: code, image_url: b.dataset.del })); });
			document.getElementById('imgfile').onchange = async (ev) => {
				const files = Array.from(ev.target.files || []); if (!files.length) return;
				const m = document.getElementById('upmsg'); m.innerHTML = '<div class="ag-muted">Đang tải ảnh lên...</div>';
				let last = d;
				for (const f of files) {
					const fd = new FormData(); fd.append('file', f); fd.append('is_private', '0'); fd.append('folder', 'Home');
					let url;
					try { const res = await fetch('/api/method/upload_file', { method: 'POST', headers: { 'X-Frappe-CSRF-Token': (frappe.csrf_token || '') }, body: fd }); url = (await res.json()).message.file_url; }
					catch (er) { m.innerHTML = '<div class="ag-warn">Tải ảnh lỗi, thử lại.</div>'; return; }
					last = await call('cago.api.owner.add_product_image', { item_code: code, image_url: url });
				}
				renderImg(last);
			};
		};
		renderImg(e.images);

		app.querySelector('#save').onclick = async () => {
			const data = {};
			app.querySelectorAll('[data-f]').forEach(el => { data[el.dataset.f] = (el.type === 'checkbox') ? (el.checked ? 1 : 0) : el.value; });
			const msg = app.querySelector('#msg'); const btn = app.querySelector('#save'); btn.disabled = true;
			try { await call('cago.api.owner.update_product', { item_code: code, data: JSON.stringify(data) });
				msg.innerHTML = '<div style="height:12px"></div><div class="ag-ok">✅ Đã lưu sản phẩm.</div>';
			} catch (e2) { msg.innerHTML = '<div class="ag-warn">Lỗi: không lưu được.</div>'; }
			btn.disabled = false;
		};
	}

	async function createProductForm() {
		spin();
		const meta = await call('cago.api.owner.get_product_meta', {});
		app.innerHTML = `${backBar()}<div class="ag-title" style="font-size:20px">THÊM SẢN PHẨM</div>
			<div class="ag-detail">
				<label class="ag-elabel">Tên sản phẩm *</label><input class="ag-einput" id="n-name" autofocus>
				<label class="ag-elabel">Nhóm hàng *</label><select class="ag-einput" id="n-group">${['', ...meta.item_groups].map(g => `<option>${esc(g)}</option>`).join('')}</select>
				<label class="ag-elabel">Đơn vị (Bao/Gói/Chai...) *</label><input class="ag-einput" id="n-unit" list="uoms" value="Bao"><datalist id="uoms">${meta.uoms.map(u => `<option value="${esc(u)}">`).join('')}</datalist>
				<label class="ag-elabel">Giá bán (đồng)</label><input class="ag-einput" id="n-price" inputmode="numeric">
				<label class="ag-elabel">Tồn kho hiển thị</label><select class="ag-einput" id="n-stock">${['', ...meta.stock_status_options].map(o => `<option>${esc(o)}</option>`).join('')}</select>
				<label class="ag-echk"><input type="checkbox" id="n-chem"> Là hóa chất/thuốc</label>
				<label class="ag-echk"><input type="checkbox" id="n-pub" checked> Hiển thị trên kiosk</label>
				<div style="height:14px"></div><button class="ag-btn green ag-confirm" id="n-save">Tạo sản phẩm</button><div id="n-msg"></div>
			</div>`;
		wireBack(home);
		app.querySelector('#n-save').onclick = async () => {
			const name = app.querySelector('#n-name').value.trim(), group = app.querySelector('#n-group').value, msg = app.querySelector('#n-msg');
			if (!name) { msg.innerHTML = '<div class="ag-warn">Nhập tên sản phẩm.</div>'; return; }
			if (!group) { msg.innerHTML = '<div class="ag-warn">Chọn nhóm hàng.</div>'; return; }
			app.querySelector('#n-save').disabled = true;
			try {
				const data = {
					cago_display_name: name, item_group: group, stock_uom: app.querySelector('#n-unit').value.trim(),
					selling_price: app.querySelector('#n-price').value, cago_stock_status_manual: app.querySelector('#n-stock').value,
					cago_is_chemical: app.querySelector('#n-chem').checked ? 1 : 0, cago_is_public_visible: app.querySelector('#n-pub').checked ? 1 : 0,
				};
				const r = await call('cago.api.owner.create_product', { data: JSON.stringify(data) });
				productEditor(r.item_code);  // continue: add images / advice / ...
			} catch (e) { msg.innerHTML = '<div class="ag-warn">Lỗi: không tạo được sản phẩm.</div>'; app.querySelector('#n-save').disabled = false; }
		};
	}

	async function customerLedger(customer) {
		spin();
		const d = await call('cago.api.debt.get_customer_ledger', { customer });
		const rows = d.entries.map(e => `<div class="ag-row"><span><b>${e.type === 'debt' ? '📝' : '💵'} ${esc(e.label)}</b><br><span class="ag-muted">${esc(e.date)}</span></span><span style="text-align:right"><b style="font-size:16px;color:${e.type === 'debt' ? '#dc2626' : '#16a34a'}">${e.type === 'debt' ? '+' : '−'}${esc(e.amount_text)}</b><br><button class="ag-back" style="font-size:13px;padding:4px 8px;background:#fee2e2;color:#b91c1c" data-cancel="${esc(e.voucher_type)}|${esc(e.voucher_no)}">Huỷ</button></span></div>`).join('') || '<div class="ag-muted">Chưa có giao dịch.</div>';
		app.innerHTML = `${backBar(null, 'Quay lại')}<div class="ag-detail">
			<h2>${esc(d.customer_name)}</h2>
			<div class="ag-row"><span class="ag-muted">${d.overpaid ? 'Khách trả dư' : 'Đang nợ'}</span><span class="ag-bigdebt">${esc(d.outstanding_text)}</span></div>
			<button class="ag-btn teal ag-confirm" id="zalo" style="margin-top:10px">📩 Soạn tin nhắc nợ (Zalo)</button>
			<div class="ag-sec" style="margin-top:12px;font-weight:800">Lịch sử ghi nợ / trả nợ</div>
			${rows}</div>`;
		wireBack(views.debtListView);
		app.querySelector('#zalo').onclick = async () => {
			const r = await call('cago.api.owner.zalo_draft', { kind: 'debt_reminder', customer });
			showDraft(r.text);
		};
		app.querySelectorAll('[data-cancel]').forEach(b => b.onclick = async () => {
			const [vt, vn] = b.dataset.cancel.split('|');
			if (!confirm('Huỷ bút toán này? (dùng khi ghi nhầm)')) return;
			await call('cago.api.debt.cancel_entry', { voucher_type: vt, voucher_no: vn, customer });
			customerLedger(customer);
		});
	}

	// Show a copyable message draft (Zalo/SMS).
	function showDraft(text) {
		const ov = document.createElement('div');
		ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px';
		ov.innerHTML = `<div style="background:#fff;border-radius:16px;padding:20px;max-width:440px;width:100%">
			<h3>📩 Tin nhắn (sao chép gửi Zalo)</h3>
			<textarea id="draft-t" rows="4" style="width:100%;box-sizing:border-box;padding:12px;font-size:16px;border:2px solid #cbd5e1;border-radius:10px">${esc(text)}</textarea>
			<button class="ag-btn green" id="draft-copy" style="width:100%;margin-top:10px">Sao chép</button>
			<button class="ag-btn gray" id="draft-close" style="width:100%;margin-top:8px">Đóng</button></div>`;
		document.body.appendChild(ov);
		ov.querySelector('#draft-copy').onclick = () => { const t = ov.querySelector('#draft-t'); t.select(); try { navigator.clipboard.writeText(t.value); } catch (e) { document.execCommand('copy'); } ov.querySelector('#draft-copy').textContent = '✅ Đã sao chép'; };
		ov.querySelector('#draft-close').onclick = () => ov.remove();
	}

	frappe.ready(home);
})();
</script>
{% endblock %}
