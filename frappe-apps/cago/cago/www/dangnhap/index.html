{% extends "templates/web.html" %}

{% block title %}Đăng nhập - {{ brand }}{% endblock %}

{% block page_content %}
<style>
	.navbar, .web-footer, footer, .page-head { display: none !important; }
	body { background: #f0fdf4; }
	.lg-wrap { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
	.lg-card { background: #fff; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 28px 24px; max-width: 420px; width: 100%; }
	.lg-logo { font-size: 34px; font-weight: 900; color: #16a34a; text-align: center; }
	.lg-sub { text-align: center; color: #64748b; margin: 4px 0 20px; font-size: 17px; }
	.lg-card label { display: block; font-weight: 700; color: #334155; margin: 12px 0 4px; }
	.lg-card input { width: 100%; box-sizing: border-box; padding: 14px; font-size: 18px; border: 2px solid #86efac; border-radius: 12px; }
	.lg-btn { width: 100%; min-height: 58px; margin-top: 18px; font-size: 20px; font-weight: 800; color: #fff; background: #16a34a; border: none; border-radius: 12px; cursor: pointer; }
	.lg-btn:active { transform: scale(.99); }
	.lg-err { background: #fee2e2; color: #b91c1c; border-radius: 10px; padding: 12px; margin-top: 14px; display: none; }
</style>

<div class="lg-wrap">
	<div class="lg-card">
		<div class="lg-logo">🌾 {{ brand }}</div>
		<div class="lg-sub">Đăng nhập cửa hàng</div>
		<label for="usr">Số điện thoại hoặc tài khoản</label>
		<input id="usr" autocomplete="username" inputmode="tel" placeholder="VD: 0987654321" autofocus>
		<label for="pwd">Mật khẩu</label>
		<input id="pwd" type="password" autocomplete="current-password">
		<button class="lg-btn" id="login">Đăng nhập</button>
		<div class="lg-err" id="err"></div>
	</div>
</div>

<script>
(function () {
	const usr = document.getElementById('usr'), pwd = document.getElementById('pwd');
	const btn = document.getElementById('login'), err = document.getElementById('err');
	async function doLogin() {
		const u = usr.value.trim(), p = pwd.value;
		if (!u || !p) { err.textContent = 'Nhập tài khoản và mật khẩu.'; err.style.display = 'block'; return; }
		btn.disabled = true; btn.textContent = 'Đang đăng nhập...'; err.style.display = 'none';
		try {
			const body = new URLSearchParams({ usr: u, pwd: p });
			const res = await fetch('/api/method/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Frappe-CSRF-Token': (window.frappe && frappe.csrf_token) || '' }, body });
			if (res.ok) {
				let dest = '/';
				try { dest = (await res.json()).home_page || '/'; } catch (e) {}
				window.location.href = dest;
				return;
			}
			err.textContent = 'Sai tài khoản hoặc mật khẩu. Bác kiểm tra lại nhé.';
		} catch (e) {
			err.textContent = 'Lỗi kết nối, thử lại.';
		}
		err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Đăng nhập';
	}
	btn.onclick = doLogin;
	[usr, pwd].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
})();
</script>
{% endblock %}
