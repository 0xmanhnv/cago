name: backend (cago tests + audit)

# Runs the cago test suite + security/safety audit inside the OFFICIAL ERPNext v16 image
# (frappe/erpnext:version-16 — the same base our production Dockerfile uses). That image
# already ships the exact Python/Node/Redis tooling and a working bench with frappe +
# erpnext installed, so we skip the fragile `bench init` / `bench get-app` / dependency
# setup entirely and just: copy the local cago app in, create a throwaway site, run tests.
# This whole sequence is validated locally against the same image before each change.

on:
  push:
    branches: [main]
    paths: ["frappe-apps/cago/**", ".github/workflows/backend.yml", "infra/docker/Dockerfile"]
  pull_request:
    paths: ["frappe-apps/cago/**", ".github/workflows/backend.yml", "infra/docker/Dockerfile"]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MariaDB + Redis on a shared docker network
        run: |
          docker network create cago-ci
          docker run -d --name mariadb --network cago-ci \
            -e MARIADB_ROOT_PASSWORD=root \
            --health-cmd="healthcheck.sh --connect --innodb_initialized" \
            --health-interval=5s --health-timeout=5s --health-retries=20 \
            mariadb:10.6 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
          docker run -d --name redis-cache --network cago-ci redis:6.2-alpine
          docker run -d --name redis-queue --network cago-ci redis:6.2-alpine

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            s=$(docker inspect -f '{{.State.Health.Status}}' mariadb 2>/dev/null || echo none)
            echo "mariadb health: $s"
            [ "$s" = "healthy" ] && exit 0
            sleep 3
          done
          echo "MariaDB did not become healthy"; docker logs mariadb; exit 1

      - name: Install cago, create site, run tests + audit
        run: |
          docker run --rm --network cago-ci \
            -v "${GITHUB_WORKSPACE}":/workspace:ro \
            frappe/erpnext:version-16 bash -c '
              set -e
              cd /home/frappe/frappe-bench
              cp -r /workspace/frappe-apps/cago apps/cago
              ./env/bin/pip install --no-cache-dir -e apps/cago
              ls -1 apps > sites/apps.txt   # regenerate (newline-safe app registry)
              bench set-config -g db_host mariadb
              bench set-config -g redis_cache "redis://redis-cache:6379"
              bench set-config -g redis_queue "redis://redis-queue:6379"
              bench set-config -g redis_socketio "redis://redis-queue:6379"
              bench new-site test_site \
                --mariadb-user-host-login-scope=% \
                --admin-password admin \
                --db-root-username root --db-root-password root \
                --install-app erpnext --install-app cago --set-default
              bench --site test_site set-config allow_tests true
              bench --site test_site execute cago.setup.company.ensure_company
              bench --site test_site execute cago.setup.sample_data.import_sample_products
              bench --site test_site run-tests --app cago
              bench --site test_site execute cago.setup.audit.run_audit
            '
