name: backend (cago tests + audit)

# Spins up Frappe v16 + ERPNext v16, installs the cago app from this repo, creates a
# throwaway site, then runs the cago test suite and the security/safety audit.
# Heavier (~10-15 min) — the fast gate is the `web` workflow.

on:
  push:
    branches: [main]
    paths: ["frappe-apps/cago/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["frappe-apps/cago/**", ".github/workflows/backend.yml"]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=15
      redis-cache:
        image: redis:6.2-alpine
        ports: ["13000:6379"]
      redis-queue:
        image: redis:6.2-alpine
        ports: ["11000:6379"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-python@v5
        with:
          # frappe==16.19.0 pins Python >=3.14,<3.15 (and uses PEP 695 `type` syntax).
          python-version: "3.14"
          allow-prereleases: true
      - uses: actions/setup-node@v4
        with:
          # Frappe v16 package.json pins node >=24 (yarn install validates the engine).
          node-version: "24"

      - name: System deps
        run: |
          sudo apt-get update
          # redis-server: `bench init` shells out to `redis-server --version` to generate
          # its redis config, so the binary must be present even though tests use the
          # redis service containers above (not this local install).
          sudo apt-get install -y --no-install-recommends \
            mariadb-client libmysqlclient-dev wkhtmltopdf redis-server
          sudo npm install -g yarn

      - name: Configure MariaDB (utf8mb4)
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
            SET GLOBAL character_set_server = 'utf8mb4';
            SET GLOBAL collation_server = 'utf8mb4_unicode_ci';"

      - name: Install bench
        run: pip install frappe-bench

      - name: bench init (Frappe v16)
        run: bench init --frappe-branch version-16 --skip-assets --python "$(which python)" frappe-bench

      - name: Get apps (ERPNext v16 + cago)
        working-directory: frappe-bench
        run: |
          bench get-app --branch version-16 erpnext
          bench get-app cago "${GITHUB_WORKSPACE}/repo/frappe-apps/cago"

      - name: Create site + install apps
        working-directory: frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -gp redis_cache "redis://127.0.0.1:13000"
          bench set-config -gp redis_queue "redis://127.0.0.1:11000"
          bench set-config -gp redis_socketio "redis://127.0.0.1:11000"
          bench new-site test_site \
            --mariadb-user-host-login-scope='%' \
            --admin-password admin \
            --db-root-username root \
            --db-root-password root \
            --install-app erpnext \
            --install-app cago \
            --set-default
          bench --site test_site execute cago.setup.company.ensure_company
          bench --site test_site execute cago.setup.sample_data.import_sample_products

      - name: Run cago tests
        working-directory: frappe-bench
        run: bench --site test_site run-tests --app cago

      - name: Security / safety audit
        working-directory: frappe-bench
        run: bench --site test_site execute cago.setup.audit.run_audit
