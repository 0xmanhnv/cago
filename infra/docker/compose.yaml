# Cago — full ERPNext v16 stack with the cago app baked in.
#
#   cd infra/docker
#   cp .env.example .env          # adjust passwords / ports / site name
#   docker compose build          # build the custom image (ERPNext + cago)
#   docker compose up -d          # start the stack; create-site runs once
#   # open http://localhost:8080  (login: Administrator / ADMIN_PASSWORD)
#
# Services: configurator + create-site (one-shot init), backend (gunicorn),
# websocket, scheduler, queue-short, queue-long, frontend (nginx), db (MariaDB),
# redis-cache, redis-queue.

name: agrimate

# ---- shared image/build definition -----------------------------------------
x-app-image: &app_image
  image: ${IMAGE:-cago/erpnext}:${VERSION:-v16}
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile
    args:
      ERPNEXT_VERSION: ${ERPNEXT_VERSION:-version-16}

x-bench-volumes: &bench_volumes
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs

# Same as bench volumes + a host folder the daily backup mirrors to (cago.setup.backup). Repoint
# the left side to a real offsite mount (USB/NAS/Drive-synced dir) for true off-machine backups.
x-bench-volumes-offsite: &bench_volumes_offsite
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs
  - ./backups/offsite:/offsite

services:
  # --- one-shot: write common_site_config (db + redis) -----------------------
  configurator:
    <<: *app_image
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes: *bench_volumes
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # --- one-shot: create the site and install erpnext + cago --------
  create-site:
    <<: *app_image
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        if [ -d "sites/$$SITE_NAME" ]; then
          echo "Site $$SITE_NAME already exists - skipping creation";
          exit 0;
        fi;
        bench new-site
        --mariadb-user-host-login-scope='%'
        --admin-password="$$ADMIN_PASSWORD"
        --db-root-username=root
        --db-root-password="$$DB_ROOT_PASSWORD"
        --install-app erpnext
        --install-app cago
        --set-default
        "$$SITE_NAME";
        bench --site "$$SITE_NAME" execute cago.setup.seed.seed_baseline;
        if [ "$$LOAD_SAMPLE_DATA" = "1" ]; then
          bench --site "$$SITE_NAME" execute cago.setup.sample_data.import_sample_products;
        else
          echo "LOAD_SAMPLE_DATA != 1 — EMPTY catalog (production). Baseline (company/price/categories) is already seeded; import real products via docs/user/NHAP_DU_LIEU_CSV.md";
        fi
    environment:
      SITE_NAME: ${SITE_NAME:-agrimate.localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin}
      LOAD_SAMPLE_DATA: ${LOAD_SAMPLE_DATA:-1}  # 1 = seed demo products (dev); 0 = clean (production)
    volumes: *bench_volumes
    depends_on:
      configurator:
        condition: service_completed_successfully

  # --- long-running services -------------------------------------------------
  backend:
    <<: *app_image
    restart: unless-stopped
    command:
      - /home/frappe/frappe-bench/env/bin/gunicorn
      - --chdir=/home/frappe/frappe-bench/sites
      - --bind=0.0.0.0:8000
      - --threads=4
      - --workers=2
      - --worker-class=gthread
      - --worker-tmp-dir=/dev/shm
      - --timeout=120
      - --preload
      - frappe.app:application
    environment:
      CAGO_BACKUP_OFFSITE_DIR: /offsite
    volumes: *bench_volumes_offsite
    depends_on:
      create-site:
        condition: service_completed_successfully

  websocket:
    <<: *app_image
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes: *bench_volumes
    depends_on:
      create-site:
        condition: service_completed_successfully

  scheduler:
    <<: *app_image
    restart: unless-stopped
    command: ["bench", "schedule"]
    environment:
      CAGO_BACKUP_OFFSITE_DIR: /offsite
    volumes: *bench_volumes_offsite
    depends_on:
      create-site:
        condition: service_completed_successfully

  queue-short:
    <<: *app_image
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "short,default"]
    volumes: *bench_volumes
    depends_on:
      create-site:
        condition: service_completed_successfully

  queue-long:
    <<: *app_image
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes: *bench_volumes
    depends_on:
      create-site:
        condition: service_completed_successfully

  # Frappe nginx — now INTERNAL only. The Next.js `web` service is the public entry
  # and proxies /api,/app,/files,/assets,/socket.io here (one origin → cookies+CSRF work).
  frontend:
    <<: *app_image
    restart: unless-stopped
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-agrimate.localhost}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes: *bench_volumes
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    # Internal-only behind `web`. Uncomment to expose Frappe directly for debugging.
    # ports:
    #   - "8081:8080"

  # Public entry: Next.js UI (kiosk / owner / staff / login) + PWA.
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    image: cago/web:v1
    restart: unless-stopped
    environment:
      FRAPPE_INTERNAL_URL: http://frontend:8080
      NODE_ENV: production
    depends_on:
      frontend:
        condition: service_started
    # Dev/LAN: published on all interfaces (0.0.0.0). In production behind Caddy (TLS), set
    # HTTP_PUBLISH_BIND=127.0.0.1 so only Caddy (443) is reachable from the network, not plain HTTP.
    ports:
      - "${HTTP_PUBLISH_BIND:-0.0.0.0}:${HTTP_PUBLISH_PORT:-8080}:3000"

  # --- datastores ------------------------------------------------------------
  db:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin}
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  # Optional Python chatbot (docs/10). Opt-in: `docker compose --profile chatbot up -d`.
  chatbot:
    build:
      context: ../../services/cago_chatbot_service
      dockerfile: Dockerfile
    image: cago/chatbot:v1
    restart: unless-stopped
    profiles: ["chatbot"]
    environment:
      ERPNEXT_URL: http://frontend:8080
    ports:
      - "${CHATBOT_PUBLISH_PORT:-8100}:8100"
    depends_on:
      frontend:
        condition: service_started

  # Optional daily backup (DB + files). Opt-in: `docker compose --profile backup up -d`.
  # Writes straight to /offsite (mapped to ./backups/offsite — repoint this to a USB/NAS/Drive-synced
  # dir for true off-machine safety) and prunes anything older than BACKUP_KEEP_DAYS.
  backup:
    <<: *app_image
    restart: unless-stopped
    profiles: ["backup"]
    entrypoint: ["bash", "-c"]
    command:
      - >
        while true; do
          bench --site "$$SITE_NAME" backup --with-files --backup-path /offsite || true;
          find /offsite -type f -mtime +$${BACKUP_KEEP_DAYS:-14} -delete 2>/dev/null || true;
          sleep "$${BACKUP_INTERVAL:-86400}";
        done
    environment:
      SITE_NAME: ${SITE_NAME:-agrimate.localhost}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes: *bench_volumes_offsite
    depends_on:
      db:
        condition: service_healthy

  # Optional TLS reverse proxy (production). Opt-in: `docker compose --profile tls up -d caddy`.
  # SITE_DOMAIN = a real domain → Caddy auto-obtains a Let's Encrypt cert (needs DNS → this server
  # + ports 80/443 open). SITE_DOMAIN = a bare IP → Caddy serves a self-signed/internal cert
  # (install Caddy's root CA on devices once). Either way it terminates HTTPS in front of `web`.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-:443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_started

volumes:
  sites:
  logs:
  db-data:
  redis-cache-data:
  redis-queue-data:
  caddy-data:
  caddy-config:
